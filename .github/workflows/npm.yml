name: Publish npm

on:
  workflow_dispatch:
    inputs:
      confirm_version:
        description: "npm package version to publish"
        required: true
        default: "0.2.11"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @seemseam/architec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Validate requested version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "${PACKAGE_VERSION}" = "${{ inputs.confirm_version }}"
          git ls-remote --exit-code --tags origin "refs/tags/v${PACKAGE_VERSION}"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Test dispatcher
        run: npm test

      - name: Verify GitHub Release binary assets
        run: npm run release-assets:check
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Inspect npm package contents
        run: npm pack --dry-run --json

      - name: Publish to npm with trusted publishing
        run: |
          npm config delete //registry.npmjs.org/:_authToken --userconfig "$NPM_CONFIG_USERCONFIG" || true
          unset NODE_AUTH_TOKEN
          npm publish --access public --registry https://registry.npmjs.org/
