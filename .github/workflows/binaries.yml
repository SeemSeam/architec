name: Build archi binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Architec version to build from PyPI"
        required: true
        default: "0.2.11"
      upload_release:
        description: "Upload assets to the matching GitHub Release"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.triplet }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            triplet: linux-x64
          - runner: macos-15-intel
            triplet: darwin-x64
          - runner: macos-14
            triplet: darwin-arm64
          - runner: windows-latest
            triplet: win32-x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install released Python package set
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install "architec==${{ inputs.version }}"

      - name: Build standalone binary
        run: python scripts/build-standalone-archi.py
        env:
          ARCHITEC_BINARY_VERSION: ${{ inputs.version }}
          ARCHITEC_BINARY_TRIPLET: ${{ matrix.triplet }}

      - name: Smoke test binary
        shell: python
        run: |
          import os
          import subprocess
          import sys
          from pathlib import Path

          suffix = ".exe" if os.name == "nt" else ""
          artifact = Path("build") / "standalone" / f"archi-v${{ inputs.version }}-${{ matrix.triplet }}{suffix}"
          result = subprocess.run([str(artifact), "--version"], text=True)
          sys.exit(result.returncode)

      - uses: actions/upload-artifact@v4
        with:
          name: archi-${{ matrix.triplet }}
          path: build/standalone/archi-v${{ inputs.version }}-${{ matrix.triplet }}*
          if-no-files-found: error

  upload-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: build
    if: inputs.upload_release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare checksums
        run: |
          find release-assets -type f -name "archi-v${{ inputs.version }}-*" ! -name "*checksums.txt" -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#release-assets/[^/]*/##' \
            > "archi-v${{ inputs.version }}-checksums.txt"

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v${{ inputs.version }}" >/dev/null
          gh release upload "v${{ inputs.version }}" \
            release-assets/*/archi-v${{ inputs.version }}-* \
            "archi-v${{ inputs.version }}-checksums.txt" \
            --clobber
