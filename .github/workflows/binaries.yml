name: Build archi binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Architec version to build from PyPI"
        required: true
        default: "0.2.12"
      upload_release:
        description: "Upload assets to the matching GitHub Release"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.triplet }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            triplet: linux-x64
          - runner: macos-15-intel
            triplet: darwin-x64
          - runner: macos-14
            triplet: darwin-arm64
          - runner: windows-latest
            triplet: win32-x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install released Python package set
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install "architec==${{ inputs.version }}"

      - name: Build standalone binary
        run: python scripts/build-standalone-archi.py
        env:
          ARCHITEC_BINARY_VERSION: ${{ inputs.version }}
          ARCHITEC_BINARY_TRIPLET: ${{ matrix.triplet }}

      - name: Smoke test binary
        shell: python
        run: |
          import os
          import subprocess
          import sys
          from pathlib import Path

          suffix = ".exe" if os.name == "nt" else ""
          artifact = Path("build") / "standalone" / f"archi-v${{ inputs.version }}-${{ matrix.triplet }}{suffix}"
          result = subprocess.run([str(artifact), "--version"], text=True)
          sys.exit(result.returncode)

      - name: Smoke test bundled Hippos refresh
        shell: python
        run: |
          import os
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          suffix = ".exe" if os.name == "nt" else ""
          artifact = (Path("build") / "standalone" / f"archi-v${{ inputs.version }}-${{ matrix.triplet }}{suffix}").resolve()
          project = Path(tempfile.mkdtemp(prefix="archi-bundled-hippos-"))
          (project / "src").mkdir()
          (project / "src" / "app.py").write_text("print('ok')\n", encoding="utf-8")
          empty_path = project / "empty-path"
          empty_path.mkdir()
          env = os.environ.copy()
          env["PATH"] = str(empty_path)
          env["HOME"] = str(project / "home")
          env["ARCHITEC_USER_CONFIG_DIR"] = str(project / "home" / ".architec")
          env["HIPPOS_USER_CONFIG_DIR"] = str(project / "home" / ".hippos")
          env["HIPPOCAMPUS_USER_CONFIG_DIR"] = str(project / "home" / ".hippocampus")
          result = subprocess.run(
              [
                  str(artifact),
                  "--refresh-from-hippos",
                  "--full",
                  "--format",
                  "json",
                  "--out",
                  str(project / "archi-result.json"),
                  str(project),
              ],
              text=True,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              env=env,
          )
          if result.returncode != 0:
              print(result.stdout)
              print(result.stderr, file=sys.stderr)
              raise SystemExit(result.returncode)
          required = [
              project / ".hippos" / "architect-metrics.json",
              project / ".hippos" / "hippos-index.json",
              project / ".hippos" / "code-signatures.json",
              project / ".hippos" / "structure-prompt.md",
          ]
          missing = [str(path) for path in required if not path.is_file()]
          if missing:
              print(result.stdout)
              print(result.stderr, file=sys.stderr)
              print("Missing bundled Hippos refresh artifacts: " + ", ".join(missing), file=sys.stderr)
              raise SystemExit(1)

      - uses: actions/upload-artifact@v4
        with:
          name: archi-${{ matrix.triplet }}
          path: build/standalone/archi-v${{ inputs.version }}-${{ matrix.triplet }}*
          if-no-files-found: error

  upload-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: build
    if: inputs.upload_release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare checksums
        run: |
          find release-assets -type f -name "archi-v${{ inputs.version }}-*" ! -name "*checksums.txt" -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#release-assets/[^/]*/##' \
            > "archi-v${{ inputs.version }}-checksums.txt"

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "v${{ inputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null
          gh release upload "v${{ inputs.version }}" --repo "$GITHUB_REPOSITORY" \
            release-assets/*/archi-v${{ inputs.version }}-* \
            "archi-v${{ inputs.version }}-checksums.txt" \
            --clobber
