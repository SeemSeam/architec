name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-compiled:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target_os: linux
            target_arch: x86_64
            artifact_name: compiled-linux-x86_64
          - runner: macos-14
            target_os: macos
            target_arch: arm64
            artifact_name: compiled-macos-arm64
          - runner: windows-latest
            target_os: windows
            target_arch: x86_64
            artifact_name: compiled-windows-x86_64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      ARCHITEC_LLMGATEWAY_SRC: ${{ github.workspace }}/architec/vendor/llmgateway/src
      PYTHON_BIN: python
      ARCHITEC_TARGET_OS: ${{ matrix.target_os }}
      ARCHITEC_TARGET_ARCH: ${{ matrix.target_arch }}
    steps:
      - name: Checkout architec
        uses: actions/checkout@v6
        with:
          path: architec

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        working-directory: architec
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set zstandard

      - name: Install Linux build prerequisites
        if: matrix.target_os == 'linux'
        working-directory: architec
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Build compiled artifact
        working-directory: architec
        run: bash tools/build_nuitka.sh

      - name: Upload compiled artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            architec/dist/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}.tar.gz
            architec/dist/archi-${{ matrix.target_os }}-${{ matrix.target_arch }}.zip
          if-no-files-found: error

  publish:
    needs: build-compiled
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      ARCHITEC_RELEASE_REPO: bfly123/architec-releases
      PYTHON_BIN: python
      ARCHITEC_VERSION_TAG: ${{ github.event.inputs.version_tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.ARCHITEC_RELEASES_TOKEN }}
    steps:
      - name: Validate token secret
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "ARCHITEC_RELEASES_TOKEN is required to publish into ${ARCHITEC_RELEASE_REPO}" >&2
            exit 1
          fi

      - name: Checkout architec
        uses: actions/checkout@v6
        with:
          path: architec

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download compiled artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: compiled-*
          path: architec/dist
          merge-multiple: true

      - name: Install packaging dependencies
        working-directory: architec
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Publish release artifacts
        working-directory: architec
        env:
          ARCHITEC_RELEASE_PREBUILT_ARTIFACTS: "1"
        run: bash tools/publish_release.sh
